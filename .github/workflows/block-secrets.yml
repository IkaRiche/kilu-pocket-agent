name: Block Secrets

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  block-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Keystores (.jks, .p12, .b64)
        run: |
          LEAKS=$(find . -name "*.jks" -o -name "*.p12" -o -name "*.jks.b64" -o -name "*.pem")
          if [ -n "$LEAKS" ]; then
            echo "ERROR: Found secret/keystore files committed to the repository!"
            echo "$LEAKS"
            exit 1
          else
            echo "No secrets found. Clean."
          fi
